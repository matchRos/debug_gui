# Routing plane in base_link, heights along plane normal, grasp planning along trace.
#
# routing_planes.main.origin (metres):
#   - origin[0] (X) is the board plane constant together with normal [-1,0,0].
#   - origin[1], origin[2] (Y,Z) are only a reference point ON the plane; for a
#     plane with normal along ±X they do NOT change the (Y,Z) coming from the
#     homography — those come only from pixel_to_world. They matter for bookkeeping
#     and for code that subtracts ``plane.origin``; you can set Y,Z to 0 if you prefer.
#   Values are in metres (not centimetres).

routing_plane_default_id: main
clip_plane_assignments: {}

routing_planes:
  main:
    origin: [0.53, 0.0, 0.08]
    normal: [-1.0, 0.0, 0.0]
    u_axis: [0.0, 0.0, 1.0]
    v_axis: [0.0, 1.0, 0.0]

routing_height_above_plane_m: 0.025
grasp_height_above_plane_m: 0.04
# Cable lies in YZ; extra Rx (deg) aligns MoveIt TCP with tangent (try -90 if 90 is wrong).
grasp_extra_world_rx_deg: 90.0
pregrasp_offset_from_grasp_m: 0.08
# Z shift (m) applied when converting pixels -> world (see board_projection); aligns with MoveIt world.
world_from_pixel_z_offset_m: 0.1
# Publish in this frame (poses already include world_from_pixel_z_offset_m in Z).
publish_cartesian_targets_in_world_frame: true
cartesian_targets_world_frame_id: world
cartesian_targets_world_position_offset_m: [0.0, 0.0, 0.0]
detangle_offset_from_routing_m: 0.03

# Post-grasp handover: two steps — handover_fine_orient (orientation only), handover_move_exchange (position).
# Dual-arm presentation: present_cable_vertical, second_arm_side_approach.
dual_side_second_arm_delta_z_m: -0.1
# Extra world +X rotation after base frame (deg); +90 → horizontal gripper; try -90 if inverted.
present_cable_extra_world_rx_deg: 90.0
# Second arm: R <- Ry(deg) @ R (world +Y). Prepose: moveit fast from ±Y, then slowly_approach final.
second_arm_extra_world_ry_deg: -90.0
dual_side_second_arm_prepose_offset_y_m: 0.08
dual_side_second_arm_prepose_pause_s: 0.5
# handover_goal_world_m: [0.4, 0.0, 0.4]
# Fine-tune a few degrees relative to grasp (tool frame): R = R_grasp @ Rz @ Ry @ Rx
# handover_fine_tool_rx_deg: 0.0
# handover_fine_tool_ry_deg: 0.0
# handover_fine_tool_rz_deg: 0.0

# First grasp: min distance along traced path from peg (routing[0]) in world frame.
grasp_min_clearance_from_first_peg_m: 0.08
# Dual-arm: min arc length (m) along trace from first grasp to second.
grasp_second_min_arc_from_first_grasp_m: 0.08
