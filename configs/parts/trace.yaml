# Cable tracer seeds and auto-trace tuning.

trace_start_points: [[100, 100]]
trace_end_points: null

# auto_white_rings_from_clip: first routing clip = anchor; whitest pixel on circles
# radius step, 2*step, 3*step -> three tracer seeds P0,P1,P2 (see tracing_service).
trace_start_mode: auto_white_rings_from_clip
trace_white_ring_step_px: 20.0

trace_anchor_max_start_dist_px: 90.0
trace_candidate_min_route_dot: 0.25
trace_anchor_outward_min_delta_px: 8.0

trace_auto_clip_a_p1_offset_px: 20.0
trace_auto_clip_a_p2_offset_px: 40.0
trace_seed_order_descending_from_anchor: true
